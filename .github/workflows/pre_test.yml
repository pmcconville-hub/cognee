on:
  workflow_call:

permissions:
  contents: read
jobs:
  check-uv-lock:
    name: Lockfile and Pre-commit Hooks
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Validate uv lockfile and project metadata
        run: |
          # Get timestamp for 2 days ago in UTC (ISO 8601 format)
          CUTOFF=$(date -u -v -2d +"%Y-%m-%dT%H:%M:%SZ")

          # Run uv lock check with dynamic cutoff
          uv lock --check --cutoff "$CUTOFF" || { echo "'uv lock --check' failed."; echo "Run 'uv lock' and push your changes."; exit 1; }

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1
